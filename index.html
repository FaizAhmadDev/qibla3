<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Qibla Finder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            padding: 20px;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            color: #f0c060;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 28px;
            letter-spacing: 0.04em;
        }

        /* ── Compass shell ─────────────────────────────── */
        .compass-outer {
            position: relative;
            width: 280px;
            height: 280px;
        }

        /* Rotating dial (N/S/E/W labels spin with the compass heading) */
        .compass-dial {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #1e2a38, #0d1520);
            border: 3px solid #c9a84c;
            box-shadow: 0 0 0 6px rgba(201,168,76,0.15), 0 8px 32px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
        }

        /* Cardinal direction labels on the dial */
        .cardinal {
            position: absolute;
            font-size: 14px;
            font-weight: 700;
            color: #c9a84c;
            text-align: center;
            width: 24px;
            height: 24px;
            line-height: 24px;
            margin-left: -12px;
            margin-top: -12px;
        }
        .cardinal.N { top: 14px;  left: 50%; color: #e74c3c; }
        .cardinal.S { bottom: 14px; left: 50%; transform: translateX(-50%); }
        .cardinal.E { right: 14px; top: 50%; transform: translateY(-50%); }
        .cardinal.W { left: 14px;  top: 50%; transform: translateY(-50%); }

        /* Tick marks ring */
        .ticks {
            position: absolute;
            inset: 0;
            border-radius: 50%;
        }

        /* Fixed needle layer — stays fixed, arrow points to Qibla */
        .needle-layer {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .needle-wrap {
            position: relative;
            width: 12px;
            height: 140px;
            transition: transform 0.15s ease-out;
        }

        /* Red tip points to Qibla */
        .needle-tip {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 70px solid #e74c3c;
        }

        /* White tail */
        .needle-tail {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 70px solid #ecf0f1;
        }

        /* Gold center cap */
        .needle-cap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #f0d080, #c9a84c);
            border: 2px solid #8a6020;
            z-index: 2;
        }

        /* Kaaba icon at top of needle */
        .kaaba-label {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            line-height: 1;
        }

        /* ── Info cards ─────────────────────────────────── */
        .info-grid {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .info-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 10px;
            padding: 10px 16px;
            text-align: center;
            min-width: 90px;
        }

        .info-card .label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .info-card .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f0c060;
            font-variant-numeric: tabular-nums;
        }

        /* ── Status & button ─────────────────────────────── */
        #status {
            margin-top: 18px;
            font-size: 0.82rem;
            color: #aaa;
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
            min-height: 36px;
        }

        #status.ok   { color: #2ecc71; }
        #status.warn { color: #f39c12; }
        #status.err  { color: #e74c3c; }

        button {
            margin-top: 14px;
            padding: 11px 28px;
            background: linear-gradient(135deg, #c9a84c, #e8c870);
            color: #0d1520;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.04em;
            box-shadow: 0 4px 16px rgba(201,168,76,0.3);
            transition: transform 0.12s, box-shadow 0.12s;
        }
        button:active { transform: scale(0.96); box-shadow: none; }

        #btnPermission { display: none; margin-top: 10px; }

        .calib-hint {
            margin-top: 14px;
            font-size: 0.72rem;
            color: #666;
            text-align: center;
        }

        /* Aligned pulse */
        .aligned-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 3px solid #2ecc71;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .aligned-ring.show {
            opacity: 1;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1);   opacity: 0.9; }
            50%      { transform: scale(1.04); opacity: 0.4; }
        }
    </style>
</head>
<body>

    <h2>🕋 Qibla Finder</h2>
    <div class="subtitle">اتجاه القبلة</div>

    <div class="compass-outer">
        <!-- Green aligned ring (shows when on target) -->
        <div class="aligned-ring" id="alignedRing"></div>

        <!-- Rotating dial -->
        <div class="compass-dial" id="dial">
            <svg class="ticks" viewBox="0 0 280 280">
                <!-- 72 tick marks every 5° -->
                <g id="tickGroup"></g>
            </svg>
            <span class="cardinal N">N</span>
            <span class="cardinal S">S</span>
            <span class="cardinal E">E</span>
            <span class="cardinal W">W</span>
        </div>

        <!-- Fixed needle pointing to Qibla -->
        <div class="needle-layer">
            <div class="needle-wrap" id="needle">
                <div class="kaaba-label">🕋</div>
                <div class="needle-tip"></div>
                <div class="needle-tail"></div>
                <div class="needle-cap"></div>
            </div>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <div class="label">Qibla</div>
            <div class="value" id="qiblaDeg">—°</div>
        </div>
        <div class="info-card">
            <div class="label">Heading</div>
            <div class="value" id="headingDeg">—°</div>
        </div>
        <div class="info-card">
            <div class="label">Distance</div>
            <div class="value" id="distKm">— km</div>
        </div>
    </div>

    <p id="status">Tap the button to find Qibla direction</p>
    <button id="btnStart" onclick="init()">Find Qibla Direction</button>
    <button id="btnPermission" onclick="requestOrientationPermission()">Enable Compass Sensor</button>
    <p class="calib-hint" id="calibHint" style="display:none">📳 Move phone in a figure-8 to calibrate</p>

    <script>
    // ── Generate tick marks ──────────────────────────────────────────────────
    (function buildTicks() {
        const g = document.getElementById('tickGroup');
        const cx = 140, cy = 140, r = 130;
        for (let deg = 0; deg < 360; deg += 5) {
            const rad = (deg - 90) * Math.PI / 180;
            const major = deg % 45 === 0;
            const inner = r - (major ? 14 : 7);
            const x1 = cx + Math.cos(rad) * r;
            const y1 = cy + Math.sin(rad) * r;
            const x2 = cx + Math.cos(rad) * inner;
            const y2 = cy + Math.sin(rad) * inner;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1); line.setAttribute('y1', y1);
            line.setAttribute('x2', x2); line.setAttribute('y2', y2);
            line.setAttribute('stroke', major ? '#c9a84c' : '#334');
            line.setAttribute('stroke-width', major ? '2' : '1');
            g.appendChild(line);
        }
    })();

    // ── Constants ────────────────────────────────────────────────────────────
    // Kaaba coordinates (Masjid al-Haram, Makkah)
    const KAABA_LAT = 21.4225;
    const KAABA_LNG = 39.8262;

    // ── State ────────────────────────────────────────────────────────────────
    let qiblaBearing  = null;   // bearing from user to Kaaba (0–360°, from North)
    let compassHeading = 0;     // current device compass heading (0–360°)
    let smoothHeading  = 0;     // smoothed heading for dial animation
    let smoothNeedle   = 0;     // smoothed needle angle for animation
    let targetNeedle   = 0;     // target needle rotation
    let usingAbsolute  = false; // whether deviceorientationabsolute is active
    let rafId          = null;

    // ── Great Circle Qibla bearing ────────────────────────────────────────────
    // Uses the standard formula accepted by Islamic scholars worldwide.
    // Based on spherical trigonometry (great circle navigation).
    function calculateQibla(lat, lng) {
        const φ1  = lat        * Math.PI / 180;
        const φ2  = KAABA_LAT  * Math.PI / 180;
        const Δλ  = (KAABA_LNG - lng) * Math.PI / 180;

        const y = Math.sin(Δλ);
        const x = Math.cos(φ1) * Math.tan(φ2) - Math.sin(φ1) * Math.cos(Δλ);

        let bearing = Math.atan2(y, x) * 180 / Math.PI;
        return (bearing + 360) % 360;   // normalize to 0–360
    }

    // ── Haversine distance (km) ───────────────────────────────────────────────
    function calcDistance(lat, lng) {
        const R  = 6371;
        const φ1 = lat       * Math.PI / 180;
        const φ2 = KAABA_LAT * Math.PI / 180;
        const Δφ = φ2 - φ1;
        const Δλ = (KAABA_LNG - lng) * Math.PI / 180;
        const a  = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // ── Angle helpers ─────────────────────────────────────────────────────────
    // Shortest angular difference, result in –180..+180
    function shortestAngle(from, to) {
        let d = ((to - from) % 360 + 360) % 360;
        if (d > 180) d -= 360;
        return d;
    }

    // Linear interpolation
    function lerp(a, b, t) { return a + (b - a) * t; }

    // ── Status helper ─────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = cls || '';
    }

    // ── Animation loop ────────────────────────────────────────────────────────
    function animateLoop() {
        // Smooth the compass dial (opposite to heading so N stays at top visually)
        smoothHeading += shortestAngle(smoothHeading, -compassHeading) * 0.12;
        document.getElementById('dial').style.transform =
            `rotate(${smoothHeading}deg)`;

        // Smooth the needle
        smoothNeedle += shortestAngle(smoothNeedle, targetNeedle) * 0.12;
        document.getElementById('needle').style.transform =
            `rotate(${smoothNeedle}deg)`;

        // Aligned check (within ±5°)
        const diff = Math.abs(shortestAngle(0, smoothNeedle));
        document.getElementById('alignedRing').classList.toggle('show', diff < 5 && qiblaBearing !== null);

        rafId = requestAnimationFrame(animateLoop);
    }
    animateLoop();

    // ── Orientation handler ───────────────────────────────────────────────────
    function handleOrientation(event) {
        let heading;

        // ── FIX 1: Use != null (not ||) so heading=0° (North) is handled correctly
        if (event.webkitCompassHeading != null) {
            // iOS: webkitCompassHeading is already a magnetic compass heading (0–360)
            heading = event.webkitCompassHeading;
        } else if (event.alpha != null) {
            // Android / non-iOS:
            //   deviceorientationabsolute: alpha = clockwise from magnetic North in some browsers,
            //   but the W3C spec defines alpha as CCW from arbitrary origin.
            //   Converting to clockwise compass heading: 360 − alpha
            heading = (360 - event.alpha + 360) % 360;
        } else {
            return; // no usable data
        }

        compassHeading = heading;
        document.getElementById('headingDeg').textContent = heading.toFixed(0) + '°';

        if (qiblaBearing !== null) {
            // ── FIX 3: Normalize to –180..+180 so needle always takes the short path
            targetNeedle = shortestAngle(0, qiblaBearing - heading);
            document.getElementById('needle').style.transform =
                `rotate(${targetNeedle}deg)`;
        }
    }

    // ── Start orientation listeners ───────────────────────────────────────────
    // ── FIX 2: Don't bind both events simultaneously on Android.
    //           Prefer deviceorientationabsolute (true magnetic north);
    //           fall back to deviceorientation only if absolute is unavailable.
    function startListening() {
        // Try absolute first (supported on Chrome Android, some others)
        let absoluteFired = false;

        function onAbsolute(e) {
            if (e.alpha != null) {
                absoluteFired = true;
                usingAbsolute = true;
                handleOrientation(e);
            }
        }

        window.addEventListener('deviceorientationabsolute', onAbsolute, true);

        // After a short delay, if absolute never fired, fall back to relative
        setTimeout(() => {
            if (!absoluteFired) {
                window.removeEventListener('deviceorientationabsolute', onAbsolute, true);
                window.addEventListener('deviceorientation', handleOrientation, true);
            } else {
                // Keep using absolute — remove relative if accidentally added
                window.removeEventListener('deviceorientation', handleOrientation, true);
                // Re-bind absolute properly now that we confirmed it works
                window.removeEventListener('deviceorientationabsolute', onAbsolute, true);
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            }
        }, 300);

        document.getElementById('calibHint').style.display = 'block';
        setStatus('Compass active — rotate to face Qibla ☪️', 'ok');
    }

    // ── iOS 13+ permission request ────────────────────────────────────────────
    function requestOrientationPermission() {
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(state => {
                    if (state === 'granted') {
                        startListening();
                        document.getElementById('btnPermission').style.display = 'none';
                    } else {
                        setStatus('Compass permission denied. Please allow in Settings.', 'err');
                    }
                })
                .catch(err => setStatus('Permission error: ' + err.message, 'err'));
        } else {
            startListening();
        }
    }

    // ── Main init ─────────────────────────────────────────────────────────────
    function init() {
        document.getElementById('btnStart').style.display = 'none';
        setStatus('Requesting location…', 'warn');

        if (!navigator.geolocation) {
            setStatus('Geolocation is not supported by your browser.', 'err');
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function onSuccess(position) {
                const { latitude, longitude } = position.coords;

                // Calculate Qibla bearing using Great Circle formula
                qiblaBearing = calculateQibla(latitude, longitude);
                const dist    = calcDistance(latitude, longitude);

                document.getElementById('qiblaDeg').textContent = qiblaBearing.toFixed(1) + '°';
                document.getElementById('distKm').textContent   = dist.toLocaleString() + ' km';
                setStatus(`Qibla: ${qiblaBearing.toFixed(1)}° from North`, 'ok');

                // Start compass sensor
                if (typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    // iOS 13+: show button, user must tap to grant
                    document.getElementById('btnPermission').style.display = 'inline-block';
                    setStatus('Tap "Enable Compass Sensor" to continue', 'warn');
                } else {
                    startListening();
                }
            },
            function onError(err) {
                document.getElementById('btnStart').style.display = 'inline-block';
                const msgs = {
                    1: 'Location access denied. Please allow location in browser settings.',
                    2: 'Location unavailable. Try moving outdoors.',
                    3: 'Location request timed out. Please try again.'
                };
                setStatus(msgs[err.code] || 'Location error: ' + err.message, 'err');
            },
            { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
        );
    }
    </script>
</body>
</html>
